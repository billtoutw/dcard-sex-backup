<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>Dcard 西斯板備份 - 測試版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f6f7f8; font-family: system-ui; padding: 40px; text-align: center; }
        h1 { color: #ff6b00; font-size: 2.2rem; }
        .card { background: white; margin: 20px auto; padding: 20px; max-width: 620px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>Dcard 西斯板備份系統</h1>
    <p style="margin:30px 0;">✅ 測試成功！GitHub Pages 已經正常運作</p>

    <div class="card">
        <h2>測試文章 1 - 西斯板分享</h2>
        <p>❤️ 9999　|　2026-03-04 13:50</p>
        <img src="https://picsum.photos/620/400" style="max-width:100%; border-radius:8px;">
    </div>

    <div class="card">
        <h2>測試文章 2 - 短片測試</h2>
        <p>❤️ 888　|　2026-03-04 13:45</p>
        <video controls style="max-width:100%; border-radius:8px;">
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny_720p.mp4" type="video/mp4">
        </video>
    </div>

    <div class="card">
        <h2>測試文章 3 - risu 圖床測試</h2>
        <p>❤️ 777　|　2026-03-04 13:40</p>
        <img src="https://picsum.photos/620/401" style="max-width:100%; border-radius:8px;">
    </div>
</body>
</html>
