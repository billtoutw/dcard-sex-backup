name: Dcard 西斯板自動備份

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 安裝依賴
        run: |
          pip install playwright cloudinary beautifulsoup4
          playwright install chromium
      
      - name: 執行備份
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python main.py
      
      - name: 自動 Commit 網頁檔案
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "自動更新 Dcard 備份網頁"
          title: "自動更新：Dcard 西斯板備份"
          body: "GitHub Actions 自動產生最新文章列表與媒體"
          branch: update-backup
          delete-branch: true
